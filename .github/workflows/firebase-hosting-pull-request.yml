# Déploie une preview Firebase Hosting du dashboard web-admin sur les PR.
# Le web-admin est construit (web-admin/dist), puis déployé en preview uniquement
# si le secret de service Firebase est configuré (sinon l'étape de déploiement est
# ignorée proprement, sans faire échouer la CI).

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web-admin/package-lock.json

      - name: 📦 Install & build web-admin
        working-directory: web-admin
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: projet-bus-60a3f
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          npm ci
          npm run build

      - name: 🔑 Détecter le secret Firebase
        id: secret
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJET_BUS_60A3F }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Secret FIREBASE_SERVICE_ACCOUNT_PROJET_BUS_60A3F absent : déploiement preview ignoré."
          fi

      - name: 🚀 Déployer la preview (si secret présent)
        if: steps.secret.outputs.present == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJET_BUS_60A3F }}
          projectId: projet-bus-60a3f
