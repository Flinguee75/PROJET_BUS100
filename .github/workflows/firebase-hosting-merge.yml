# Déploie le dashboard web-admin sur Firebase Hosting (live) à chaque merge sur main.
# Le web-admin est construit (web-admin/dist) puis déployé en live uniquement si le
# secret de service Firebase est configuré (sinon l'étape est ignorée proprement).

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web-admin/package-lock.json

      - name: 📦 Install & build web-admin
        working-directory: web-admin
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: projet-bus-60a3f
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          npm ci
          npm run build

      - name: 🔑 Détecter le secret Firebase
        id: secret
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJET_BUS_60A3F }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Secret FIREBASE_SERVICE_ACCOUNT_PROJET_BUS_60A3F absent : déploiement live ignoré."
          fi

      - name: 🚀 Déployer en live (si secret présent)
        if: steps.secret.outputs.present == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJET_BUS_60A3F }}
          channelId: live
          projectId: projet-bus-60a3f
